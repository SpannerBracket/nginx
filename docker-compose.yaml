services:
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    volumes:
      - /opt/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/acme/certs:/etc/nginx/certs:ro
    networks:
      ipvlan_net:
        ipv4_address: 192.168.1.7
  
networks:
  ipvlan_net:
    external: true
