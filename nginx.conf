events {
  worker_connections 1024;
}

http {

  # ── Security headers applied to all vhosts ──────────────────────────────
  add_header X-Content-Type-Options nosniff;
  add_header X-Frame-Options SAMEORIGIN;
  add_header Referrer-Policy no-referrer-when-downgrade;

  # ── Redirect all HTTP to HTTPS ───────────────────────────────────────────
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ── Pi-hole ──────────────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name pihole.9kb.uk;

    ssl_certificate     /etc/nginx/certs/pihole.fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/pihole.key.pem;

    location / {
      rewrite ^/$ /admin/ redirect;
      proxy_pass http://192.168.1.3/;
      proxy_set_header Host               $host;
      proxy_set_header X-Real-IP          $remote_addr;
      proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto  $scheme;
    }
  }

  # ── Home Assistant ───────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name homeassistant.9kb.uk;

    ssl_certificate     /etc/nginx/certs/homeassistant.fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/homeassistant.key.pem;

    # Websocket upgrade map
    proxy_http_version 1.1;
    proxy_set_header Upgrade            $http_upgrade;
    proxy_set_header Connection         "upgrade";
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    # Increase timeouts for HA long-polling
    proxy_read_timeout  3600;
    proxy_send_timeout  3600;
    proxy_connect_timeout 60;

    location / {
      proxy_pass http://192.168.1.6:8123;
    }
  }

  # ── Energy Dashboard ─────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name dashboard.9kb.uk;

    ssl_certificate     /etc/nginx/certs/dashboard.fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/dashboard.key.pem;

    # Allow embedding only inside Home Assistant
    add_header Content-Security-Policy "frame-ancestors https://homeassistant.9kb.uk" always;

    # Override global SAMEORIGIN
    add_header X-Frame-Options "" always;

    location / {
      proxy_pass http://192.168.1.14:80;
      proxy_set_header Host               $host;
      proxy_set_header X-Real-IP          $remote_addr;
      proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto  $scheme;
    }
  }

  # ── DieFive ─────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name diefive.9kb.uk;

    ssl_certificate     /etc/nginx/certs/diefive.fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/diefive.key.pem;

    # Override global SAMEORIGIN
    add_header X-Frame-Options "" always;

    location / {
      proxy_pass http://192.168.1.16:80;
      proxy_set_header Host               $host;
      proxy_set_header X-Real-IP          $remote_addr;
      proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto  $scheme;
    }
  }

}
